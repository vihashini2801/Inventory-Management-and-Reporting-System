<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Inventory Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FontAwesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Particles JS -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --button1: #667eea;
            --button2: #764ba2;
            --bg-dark: #0f2027;
            --card-dark: rgba(255, 255, 255, 0.1);
            --text-dark: white;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Segoe UI;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            color: white;
            overflow: hidden;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* CARD */
        .login-card {
            width: 360px;
            padding: 35px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        /* LOGO */
        .logo {
            width: 65px;
            height: 65px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 26px;
            margin-bottom: 15px;
        }

        /* TITLE */
        h2 {
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        /* INPUT GROUP */
        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            top: 10px;
            left: 12px;
            opacity: 0.7;
            font-size: 14px;
        }

        .input-group .toggle {
            right: 12px;
            left: auto;
            cursor: pointer;
        }

        /* INPUT FIELD */
        input {
            width: 100%;
            padding: 10px 35px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: 0.25s;
        }

        input:focus {
            box-shadow: 0 0 8px var(--primary);
            transform: scale(1.02);
        }

        /* LOGIN BUTTON */
        .login-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--button1), var(--button2));
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        /* LOADER */
        .loader {
            display: none;
            margin: auto;
            margin-top: 10px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg)
            }

            100% {
                transform: rotate(360deg)
            }
        }

        /* ERROR */
        .error {
            color: #ff8080;
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div id="particles-js"></div>

<div class="login-card">

    <div class="logo">
        <i class="fas fa-box"></i>
    </div>

    <h2>Inventory Login</h2>
    <p class="subtitle">Inventory Management System</p>

    <form th:action="@{/login}" method="post" onsubmit="showLoader()">

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <i class="fas fa-eye toggle" onclick="togglePassword()"></i>
        </div>

        <button class="login-btn">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>

        <div class="loader" id="loader"></div>

        <div th:if="${param.error}" class="error">
            Invalid username or password
        </div>

    </form>
</div>

<script>

    function showLoader() {
        document.getElementById("loader").style.display = "block";
    }

    function togglePassword() {
        const password = document.getElementById("password");

        if (password.type === "password") {
            password.type = "text";
        } else {
            password.type = "password";
        }
    }

    particlesJS("particles-js", {
        particles: {
            number: { value: 70 },
            size: { value: 3 },
            move: { speed: 2 },
            line_linked: { enable: true },
            color: { value: "#4facfe" }
        }
    });

</script>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>

        body{
            font-family: 'Segoe UI';
            background: linear-gradient(135deg,#141E30,#243B55);
            color:white;
            min-height:100vh;
        }

        #particles-js{
        position:fixed;
        width:100%;
        height:100%;
        z-index:-1;
        }

        .container-box{
        background:rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        border-radius:15px;
        padding:30px;
        box-shadow:0 15px 40px rgba(0,0,0,0.5);
        }

        .table{
        color:white;
        }

        .table thead{
        background:linear-gradient(45deg,#4facfe,#00f2fe);
        }

        .table tbody tr{
        transition:0.3s;
        }

        .table tbody tr:hover{
        transform:scale(1.01);
        background:rgba(255,255,255,0.08);
        }

        .btn{
        border-radius:20px;
        transition:0.3s;
        }

        .btn:hover{
        transform:translateY(-2px);
        box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        .header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
        }

        .title{
        font-size:28px;
        font-weight:600;
        }

        .actions{
        display:flex;
        gap:10px;
        }

    </style>

</head>

<body>

<div id="particles-js"></div>

<div class="container mt-5">

    <div class="container-box">

        <div class="header">

            <div class="title">
                📦 Product Inventory
            </div>

            <div class="actions" sec:authorize="hasRole('ADMIN')">

                <a th:href="@{/products/add}" class="btn btn-success">
                    ➕ Add Product
                </a>

                <a th:href="@{/reports/export}" class="btn btn-info">
                    ⬇ CSV
                </a>

                <a th:href="@{/reports/pdf}" class="btn btn-warning">
                    ⬇ PDF
                </a>

            </div>

        </div>

        <table class="table table-bordered text-center align-middle">

            <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Price</th>
                <th sec:authorize="hasRole('ADMIN')">Stock</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="p : ${products}">

                <td th:text="${p.name}"></td>

                <td th:text="${p.category}"></td>

                <td>
                    <span class="badge bg-primary" th:text="${p.quantity}"></span>
                </td>

                <td>
                    ₹ <span th:text="${#numbers.formatDecimal(p.price,1,2)}"></span>
                </td>

                <td sec:authorize="hasRole('ADMIN')">

                    <a th:href="@{/products/update/{id}(id=${p.id},quantity=1,type='ADD')}"
                       class="btn btn-sm btn-primary me-1">
                        ➕
                    </a>

                    <a th:href="@{/products/update/{id}(id=${p.id},quantity=1,type='REMOVE')}"
                       class="btn btn-sm btn-danger">
                        ➖
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

        <a href="/dashboard" class="btn btn-secondary mt-3">
            ⬅ Back to Dashboard
        </a>

    </div>

</div>

<script>

    particlesJS("particles-js",{
    particles:{
    number:{value:70},
    size:{value:3},
    move:{speed:2},
    line_linked:{enable:true},
    color:{value:"#4facfe"}
    }
    });

</script>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory Dashboard</title>
    <meta charset="UTF-8">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>

        body{
        margin:0;
        font-family:'Segoe UI';
        display:flex;
        background:#0f2027;
        color:white;
        overflow:hidden;
        }

        #particles-js{
        position:fixed;
        width:100%;
        height:100%;
        z-index:-1;
        }

        /* SIDEBAR */

        .sidebar{
        width:230px;
        height:100vh;
        background:linear-gradient(180deg,#1c2b3a,#0f2027);
        padding:20px;
        }

        .sidebar h2{
        margin-bottom:30px;
        }

        .sidebar a{
        display:block;
        color:white;
        text-decoration:none;
        padding:10px;
        margin:10px 0;
        border-radius:8px;
        transition:0.3s;
        }

        .sidebar a:hover{
        background:#4facfe;
        transform:scale(1.05);
        }

        /* MAIN */

        .main{
        flex:1;
        padding:30px;
        }

        /* TOP CARDS */

        .cards{
        display:flex;
        gap:20px;
        }

        .card{
        flex:1;
        background:rgba(255,255,255,0.1);
        padding:20px;
        border-radius:15px;
        backdrop-filter:blur(10px);
        transition:0.4s;
        }

        .card:hover{
        transform:translateY(-8px);
        box-shadow:0 10px 25px rgba(0,0,0,0.5);
        }

        .card p{
        font-size:28px;
        }

        /* GRID */

        .bottom-grid{
        display:grid;
        grid-template-columns:1fr 1fr 1fr;
        gap:20px;
        margin-top:30px;
        }

        /* BOX */

        .box{
        background:rgba(255,255,255,0.08);
        padding:20px;
        border-radius:15px;
        backdrop-filter:blur(10px);
        box-shadow:0 0 15px rgba(79,172,254,0.4);
        transition:0.3s;
        height:300px;
        }

        .box:hover{
        transform:translateY(-6px);
        box-shadow:0 0 30px rgba(79,172,254,0.8);
        }

        /* LIST FIX (IMPORTANT) */

        .list{
        list-style:none;
        padding:0;
        margin-top:15px;
        }

        .list li{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:10px;
        border-bottom:1px solid rgba(255,255,255,0.1);
        }
        .list li span{
          flex:1;
          text-align:center;
         }

        /* REMOVE FLOAT ISSUE */
        .list span{
        float:none;
        color:#4facfe;
        font-weight:bold;
        }

        /* ACTIVITY COLORS */

        .add{
        color:#00ff9c;
        font-weight:bold;
        }

        .remove{
        color:#ff4d4d;
        font-weight:bold;
        }

        .top-bar{
        display:flex;
        justify-content:space-between;
        }

        button{
        padding:8px 15px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        background:#4facfe;
        color:white;
        }

        button:hover{
        transform:scale(1.05);
        }

        .light-mode{
        background:#f5f5f5;
        color:black;
        }

    </style>
</head>

<body>

<div id="particles-js"></div>

<!-- SIDEBAR -->

<div class="sidebar">

    <h2>📦 Inventory</h2>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/products">📦 Products</a>
    <a href="/products/add">➕ Add Product</a>
    <a href="/low-stock">⚠ Low Stock</a>
    <a href="/logs">📜 Stock Logs</a>
    <a href="/analytics">📊 Stock Analytics</a>
    <a href="/settings">⚙ Settings</a>
    <a href="/reports/export">⬇ Download CSV</a>
    <a href="/logout">🚪 Logout</a>

    <br>
    <button onclick="toggleTheme()">🎨 Theme</button>

</div>

<!-- MAIN -->

<div class="main">

    <div class="top-bar">
        <h1>Welcome back, Admin</h1>
    </div>

    <!-- CARDS -->

    <div class="cards">

        <div class="card">
            <h3>Total Products</h3>
            <p th:text="${totalProducts}">0</p>
        </div>

        <div class="card">
            <h3>Total Inventory Value</h3>
            <p>₹ <span th:text="${totalInventoryValue}">0</span></p>
        </div>

        <div class="card">
            <h3>Low Stock Items</h3>
            <p th:text="${lowStockCount}">0</p>
        </div>

    </div>

    <!-- BOTTOM GRID -->

    <div class="bottom-grid">

        <!-- INVENTORY OVERVIEW -->

        <div class="box">

            <h3>📊 Inventory Overview</h3>

            <canvas id="inventoryChart"></canvas>

        </div>

        <!-- TOP PRODUCTS -->

        <div class="box">

            <h3>📈 Top Products</h3>

            <ul class="list">
                <li th:each="p : ${topProducts}">
                    <span th:text="${p.name}"></span>
                    <span>
            ₹ <span th:text="${p.price * p.quantity}"></span>
        </span>
                </li>
            </ul>

        </div>

        <!-- RECENT ACTIVITY -->

        <div class="box">

            <h3>⏱ Recent Activity</h3>

            <ul class="list">
                <li th:each="log : ${recentLogs}">

                    <!-- TYPE -->
                    <span th:classappend="${log.changeType == 'ADD'} ? 'add' : 'remove'"
                          th:text="${log.changeType}"></span>

                    <!-- PRODUCT -->
                    <span th:text="'ID: ' + ${log.productId}"></span>

                    <!-- QUANTITY -->
                    <span th:text="'Qty: ' + ${log.quantityChanged}"></span>

                </li>

            </ul>

        </div>

    </div>

</div>


<script>

    /* PARTICLES */

    particlesJS("particles-js",{
    particles:{
    number:{value:70},
    size:{value:3},
    move:{speed:2},
    line_linked:{enable:true},
    color:{value:"#4facfe"}
    }
    });

    /* ANIMATED CHART */

    const ctx=document.getElementById('inventoryChart');

    new Chart(ctx,{
    type:'line',
    data:{
    labels:['Products','Low Stock','Inventory Value'],
    datasets:[{
    data:[
    [[${totalProducts}]],
    [[${lowStockCount}]],
    [[${totalInventoryValue}]]
    ],
    borderColor:'#4facfe',
    backgroundColor:'rgba(79,172,254,0.2)',
    fill:true,
    tension:0.4,
    pointRadius:6
    }]
    },
    options:{
    plugins:{legend:{display:false}},
    animation:{duration:2000},
    scales:{
    x:{ticks:{color:'white'}},
    y:{ticks:{color:'white'}}
    }
    }
    });

    function toggleTheme(){
    document.body.classList.toggle("light-mode");
    }
setInterval(() => {
location.reload();
}, 5000);
</script>

</body>
</html>

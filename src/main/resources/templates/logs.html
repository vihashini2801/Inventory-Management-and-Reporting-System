<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Stock Logs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        body{
        background: linear-gradient(135deg,#4facfe,#00f2fe);
        min-height:100vh;
        font-family:'Segoe UI',sans-serif;
        }

        .card-container{
        background:white;
        border-radius:15px;
        padding:30px;
        box-shadow:0 15px 35px rgba(0,0,0,0.2);
        }

        h2{
        font-weight:700;
        color:#343a40;
        }

        .table thead{
        background:#343a40;
        color:white;
        }

        .table tbody tr{
        transition:0.3s;
        }

        .table tbody tr:hover{
        background:#f1f1f1;
        transform:scale(1.01);
        }

        .badge-in{
        background:#28a745;
        padding:6px 12px;
        font-size:13px;
        }

        .badge-out{
        background:#dc3545;
        padding:6px 12px;
        font-size:13px;
        }

        .search-box{
        border-radius:25px;
        padding:10px;
        }

        .btn-custom{
        border-radius:25px;
        padding:8px 18px;
        transition:0.3s;
        }

        .btn-custom:hover{
        transform:scale(1.05);
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="card-container">

        <h2 class="mb-4">
            <i class="fa-solid fa-clipboard-list"></i>
            Stock Logs
        </h2>

        <div class="row mb-3">

            <div class="col-md-4">
                <input type="text" id="searchInput" class="form-control search-box" placeholder="🔎 Search Product ID">
            </div>

            <div class="col-md-4">
                <input type="date" id="dateFilter" class="form-control search-box">
            </div>

            <div class="col-md-4 text-end">

                <button onclick="exportTable()" class="btn btn-success btn-custom">
                    <i class="fa-solid fa-download"></i> Export CSV
                </button>

            </div>

        </div>

        <table class="table table-striped table-hover">

            <thead>
            <tr>
                <th>Product ID</th>
                <th>Type</th>
                <th>Quantity</th>
                <th>Date</th>
            </tr>
            </thead>

            <tbody id="logTable">

            <tr th:each="log : ${logs}">

                <td th:text="${log.productId}"></td>

                <td>

<span th:if="${log.changeType == 'IN'}" class="badge badge-in">
<i class="fa-solid fa-arrow-up"></i> IN
</span>

                    <span th:if="${log.changeType == 'OUT'}" class="badge badge-out">
<i class="fa-solid fa-arrow-down"></i> OUT
</span>

                </td>

                <td th:text="${log.quantityChanged}"></td>

                <td th:text="${#temporals.format(log.changeDate,'yyyy-MM-dd')}"></td>

            </tr>

            </tbody>

        </table>

        <div class="text-end mt-3">

            <a href="/dashboard" class="btn btn-dark btn-custom">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>

        </div>

    </div>

</div>

<script>

    const searchInput = document.getElementById("searchInput");
    const dateFilter = document.getElementById("dateFilter");

    searchInput.addEventListener("keyup", filterTable);
    dateFilter.addEventListener("change", filterTable);

    function filterTable(){

    let searchValue = searchInput.value.toLowerCase();
    let dateValue = dateFilter.value;

    let rows = document.querySelectorAll("#logTable tr");

    rows.forEach(row => {

    let productId = row.cells[0].innerText.toLowerCase();
    let dateText = row.cells[3].innerText;

    let matchSearch = productId.includes(searchValue);
    let matchDate = dateValue === "" || dateText.startsWith(dateValue);

    if(matchSearch && matchDate){
    row.style.display = "";
    }else{
    row.style.display = "none";
    }

    });

    }

    function exportTable(){

    let csv=[]
    let rows=document.querySelectorAll("table tr")

    rows.forEach(row=>{

    let cols=row.querySelectorAll("td,th")
    let data=[]

    cols.forEach(col=>data.push(col.innerText))

    csv.push(data.join(","))

    })

    let csvFile=new Blob([csv.join("\n")],{type:"text/csv"})

    let downloadLink=document.createElement("a")

    downloadLink.download="stock_logs.csv"
    downloadLink.href=window.URL.createObjectURL(csvFile)
    downloadLink.style.display="none"

    document.body.appendChild(downloadLink)

    downloadLink.click()

    }

</script>

</body>
</html>

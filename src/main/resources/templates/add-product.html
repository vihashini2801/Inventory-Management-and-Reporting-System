<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>

        body{
        height:100vh;
        background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        font-family:'Segoe UI';
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
        }

        /* Particle Background */
        #particles-js{
        position:absolute;
        width:100%;
        height:100%;
        z-index:-1;
        }

        /* Glass Card */

        .form-card{

        width:450px;
        padding:35px;

        background:rgba(255,255,255,0.1);
        border-radius:20px;

        backdrop-filter:blur(15px);
        box-shadow:0 10px 40px rgba(0,0,0,0.5);

        color:white;

        animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{

        from{
        opacity:0;
        transform:translateY(30px);
        }

        to{
        opacity:1;
        transform:translateY(0);
        }

        }

        h2{
        text-align:center;
        margin-bottom:20px;
        }

        /* Inputs */

        .form-control{

        background:rgba(255,255,255,0.15);
        border:none;
        color:white;

        }

        .form-control::placeholder{
        color:#ddd;
        }

        .form-control:focus{

        background:rgba(255,255,255,0.25);
        box-shadow:0 0 10px #00d4ff;

        }

        /* Buttons */

        .btn-save{

        background:linear-gradient(45deg,#00c6ff,#0072ff);
        border:none;
        transition:0.3s;

        }

        .btn-save:hover{

        transform:scale(1.05);
        box-shadow:0 0 15px #00c6ff;

        }

        .btn-cancel{

        background:#444;
        color:white;

        }

    </style>

</head>

<body>

<div id="particles-js"></div>

<div class="form-card">

    <h2>📦 Add New Product</h2>

    <form th:action="@{/products/save}" method="post">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter product name" required>
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input type="text" name="category" class="form-control" placeholder="Product category">
        </div>

        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" name="quantity" class="form-control" placeholder="Quantity">
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input type="number" step="0.01" name="price" class="form-control" placeholder="Price">
        </div>

        <div class="mb-3">
            <label>Reorder Level</label>
            <input type="number" name="reorderLevel" class="form-control" placeholder="Minimum stock alert">
        </div>

        <div class="d-grid gap-2">

            <button class="btn btn-save">💾 Save Product</button>

            <a href="/products" class="btn btn-cancel">Cancel</a>

        </div>

    </form>

</div>

<script>

    particlesJS("particles-js",{

    particles:{
    number:{value:80},
    size:{value:3},
    move:{speed:2},
    line_linked:{enable:true,color:"#00d4ff"},
    color:{value:"#00d4ff"}
    }

    });

</script>

</body>

</html>
